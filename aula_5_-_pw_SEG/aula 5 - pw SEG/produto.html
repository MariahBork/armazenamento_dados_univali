<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos</title>
    <link rel="stylesheet" href="./assets/estilos/global.css">
</head>

<body>
    <div class="container">
        <h1> Produtos para colocar no carrinho </h1>
        <table>
            <thead>
                <tr>
                    <td> Produto </td>
                    <td> Quantidade </td>
                    <td> Preço </td>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td> Havaianas </td>
                    <td>
                        <input type="number" id="havaianas_quantidade" value="0" min="0"
                        onchange="atualizarPreco('havaianas')">
                    </td>
                    <td id="havaianas_preco">  R$ 0,00 </td>
                </tr>
                <tr>
                    <td> Alpargatas </td>
                    <td>
                        <input type="number" id="alpargatas_quantidade" value="0" min="0"
                        onchange="atualizarPreco('alpargatas')">
                    </td>
                    <td id="alpargatas_preco">  R$ 0,00 </td>
                </tr>
            </tbody>
        </table>
        <a href="./resumo.html" class="botao" onclick="salvarProdutos()"> Enviar </a>
    </div>
    <script type="text/javascript" src="./assets/scripts/produtos.js"></script>
</body>

</html>
